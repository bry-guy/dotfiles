# Generated source template for tmux dark mode (Moonfly-oriented)
set -g status-style bg=terminal,fg='#cf87e8'
set -g status-fg '#cf87e8'
set -g status-bg terminal
set -g cursor-colour '#cf87e8'

set-window-option -g mode-style bg='#4a2f57',fg='#e4e4e4'

set -g status-right '#[bg=terminal,fg=#cf87e8]#{?client_prefix,  •  ,}'
set -g status-left '#[bg=terminal,fg=#cf87e8]#T'

set -g pane-border-style fg=default
set -g pane-active-border-style 'bg=default fg=#cf87e8'

set-window-option -g window-status-style fg='#7f7f7f'
set-window-option -g window-status-current-style fg='#cf87e8',bold
