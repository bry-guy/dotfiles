# Generated from palette/sunfly.json
set -g status-style bg=terminal,fg='#463c33'
set -g status-fg '#463c33'
set -g status-bg terminal
set -g cursor-colour '#5830b0'

set-window-option -g mode-style bg='#dceee7',fg='#271e17'

set -g status-right '#[bg=terminal,fg=#004ca0]#{?client_prefix,  •  ,}'
set -g status-left '#[bg=terminal,fg=#004ca0]#T'

set -g pane-border-style fg='#b7a896'
set -g pane-active-border-style 'bg=default fg=#004ca0'

set-window-option -g window-status-style fg='#564b41'
set-window-option -g window-status-current-style fg='#004ca0',bold
